version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dbuff-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbuff
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dbuff"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dbuff-network

volumes:
  postgres-data:
    driver: local

networks:
  dbuff-network:
    driver: bridge
