version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dbuff-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbuff
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
    shm_size: '1g'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dbuff"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dbuff-network

volumes:
  postgres-data:
    driver: local

networks:
  dbuff-network:
    driver: bridge
