name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger from GitHub UI

env:
  AWS_REGION: eu-north-1
  S3_BUCKET: dbuff-deploy-${{ secrets.AWS_ACCOUNT_ID }}
  STACK_NAME: dbuff

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build JAR
        run: ./gradlew :server:bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload JAR to S3
        run: aws s3 cp server/build/libs/server-0.0.1-SNAPSHOT.jar s3://${{ env.S3_BUCKET }}/server.jar

      - name: Deploy CloudFormation stack
        run: |
          # Check if stack exists
          if aws cloudformation describe-stacks --stack-name $STACK_NAME >/dev/null 2>&1; then
            ACTION="update-stack"
          else
            ACTION="create-stack"
          fi

          aws cloudformation $ACTION \
            --stack-name $STACK_NAME \
            --template-body file://infrastructure/cloudformation/template.yaml \
            --parameters \
              ParameterKey=KeyPairName,ParameterValue=${{ secrets.KEY_PAIR_NAME }} \
              ParameterKey=DbPassword,ParameterValue=${{ secrets.DB_PASSWORD }} \
              ParameterKey=DotaApiKey,ParameterValue=${{ secrets.DOTA_API_KEY }} \
              ParameterKey=ScrapperApiKey,ParameterValue=${{ secrets.SCRAPPER_API_KEY }} \
              ParameterKey=OpenAiApiKey,ParameterValue=${{ secrets.OPENAI_API_KEY }} \
              ParameterKey=DiscordBotToken,ParameterValue=${{ secrets.DISCORD_BOT_TOKEN }} \
            --capabilities CAPABILITY_NAMED_IAM \
          || true  # update-stack fails if no changes, that's ok

          echo "==> Waiting for stack..."
          aws cloudformation wait stack-${ACTION%%-stack}-complete --stack-name $STACK_NAME

      - name: Restart application on EC2
        run: |
          EC2_IP=$(aws cloudformation describe-stacks --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' --output text)

          echo "==> Restarting dbuff on $EC2_IP"
          aws ssm send-command \
            --instance-ids "$(aws ec2 describe-instances \
              --filters "Name=ip-address,Values=$EC2_IP" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' --output text)" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["aws s3 cp s3://'"$S3_BUCKET"'/server.jar /opt/dbuff/server.jar","chown dbuff:dbuff /opt/dbuff/server.jar","systemctl restart dbuff"]' \
            --comment "Deploy new JAR"

      - name: Print outputs
        run: |
          aws cloudformation describe-stacks --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' --output table
