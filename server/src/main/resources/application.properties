spring.application.name=dbuff

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dbuff}
spring.jpa.database=POSTGRESQL
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# HikariCP connection pool configuration for virtual threads
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Hibernate batching
spring.jpa.properties.hibernate.jdbc.batch_size=25

# Virtual thread concurrency limits
app.concurrency.max-parallel-matches=30
app.concurrency.max-parallel-pages=8

scrapper.enabled=false
scrapper.provider=scraperapi
scrapper.url=http://api.scraperapi.com
scrapper.is-debug-enabled=true
scrapper.premium=false
scrapper.request-per-minute=60
scrapper.api-key=${SCRAPPER_API_KEY:}

dota-api.api-key=${DOTA_API_KEY:}
dota-api.request-per-minute=60
dota-api.is-debug-enabled=true
# Jackson configuration
spring.jackson.mapper.allow-coercion-of-scalars=true
spring.jackson.deserialization.fail-on-unknown-properties=false

# Debug logging for configuration
logging.level.com.ako.dbuff.config=DEBUG

# Cache debug logging
logging.level.org.springframework.cache=DEBUG
logging.level.com.ako.dbuff.service.constant=DEBUG

# OpenAI Configuration
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
openai.max-tokens=2000
openai.temperature=0.7
openai.base-url=https://api.openai.com/v1
openai.timeout-seconds=60
openai.enabled=true

discord.api-key=${DISCORD_BOT_TOKEN:}
discord.match-summary-channel-id=1466201625336090766

# Quartz Scheduler Configuration
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.overwrite-existing-jobs=true
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# AI Analysis logging
logging.level.com.ako.dbuff.service.ai=DEBUG

# Item Efficiency Analyzer Config
# Group 1: Hand of Midas (itemId=65)

dbuff.report.item-efficiency.groups[0].name=Magic Stick
dbuff.report.item-efficiency.groups[0].item-ids=34

dbuff.report.item-efficiency.groups[0].name=Hand of Midas
dbuff.report.item-efficiency.groups[0].item-ids=65

dbuff.report.item-efficiency.groups[1].name=Hand of Midas + Octarine Core
dbuff.report.item-efficiency.groups[1].item-ids=65,235

