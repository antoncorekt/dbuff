spring.application.name=dbuff

spring.datasource.url=jdbc:postgresql://localhost:5432/dbuff
spring.jpa.database=POSTGRESQL
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# HikariCP connection pool configuration for virtual threads
# Increase pool size to handle concurrent virtual thread operations
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Virtual thread concurrency limits
app.concurrency.max-parallel-matches=20
app.concurrency.max-parallel-pages=5

scrapper.url=http://api.scraperapi.com
scrapper.is-debug-enabled=true
scrapper.premium=false
scrapper.request-per-minute=60
scrapper.api-key=${SCRAPPER_API_KEY:}

dota-api.api-key=${DOTA_API_KEY:}
dota-api.request-per-minute=60
dota-api.is-debug-enabled=true
# Jackson configuration
spring.jackson.mapper.allow-coercion-of-scalars=true
spring.jackson.deserialization.fail-on-unknown-properties=false

# Debug logging for configuration
logging.level.com.ako.dbuff.config=DEBUG

# Cache debug logging
logging.level.org.springframework.cache=DEBUG
logging.level.com.ako.dbuff.service.constant=DEBUG

# OpenAI Configuration
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
openai.max-tokens=2000
openai.temperature=0.7
openai.base-url=https://api.openai.com/v1
openai.timeout-seconds=60
openai.enabled=true

discord.api-key=${DISCORD_BOT_TOKEN:}
discord.match-summary-channel-id=1466201625336090766

# AI Analysis logging
logging.level.com.ako.dbuff.service.ai=DEBUG

