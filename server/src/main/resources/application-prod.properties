# Production profile - deployed on AWS EC2 with RDS PostgreSQL

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/dbuff
spring.datasource.username=dbuffuser
spring.datasource.password=${DB_PASSWORD}

# HikariCP - sized for virtual threads on a single instance
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Let Hibernate manage the schema (Flyway migrations don't cover all tables yet)
spring.jpa.hibernate.ddl-auto=update

# Hibernate batching - reduces DB round-trips
# Note: entities with GenerationType.IDENTITY (PlayerStatisticSummaryDomain,
# MatchAnalysisDomain) won't batch — migrate to SEQUENCE for full benefit.
spring.jpa.properties.hibernate.jdbc.batch_size=25

# Logging - production levels
logging.level.root=INFO
logging.level.com.ako.dbuff=INFO
logging.level.org.springframework.cache=WARN
logging.level.com.ako.dbuff.config=INFO

# Actuator health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Scrapper configuration
scrapper.enabled=true
scrapper.provider=scraperapi
scrapper.is-debug-enabled=false
dota-api.is-debug-enabled=false

# Lower concurrency to avoid OpenDota API rate-limiting/SSL drops
app.concurrency.max-parallel-matches=5
app.concurrency.max-parallel-pages=2

# Stricter rate limiting for external APIs
dota-api.request-per-minute=30
scrapper.request-per-minute=30
